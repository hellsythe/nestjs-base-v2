services:

  node:
    image: node:22.21.0
    command: /bin/sh -c "while sleep 1000; do :; done"
    networks:
      - servers
    volumes:
      - ./:/app
    ports:
      - 3000:3000
    working_dir: /app
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2400M

  mongo:
    image: mongo:4.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASS}
    ports:
      - '27017:27017'
    networks:
      - servers

  mongo-express:
    image: mongo-express
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${DB_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${DB_PASS}
      ME_CONFIG_MONGODB_URL: mongodb://${DB_USER}:${DB_PASS}@mongo:27017/
      ME_CONFIG_BASICAUTH: false
    networks:
      - servers

  mockserver:
    image: mockserver/mockserver:5.15.0
    ports:
      - 1080:1080
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/initializerJson.json
    volumes:
      - ./test/containers/mockserver:/config
    networks:
      - servers

  unleash:
    image: unleashorg/unleash-server:7.2.3
    ports:
      - "4242:4242"
    environment:
      AUTH_TYPE: "none"
      AUTH_ENABLE_API_TOKENS: "false"
      DATABASE_URL: "postgres://postgres:unleash@unleash_db/db"
      DATABASE_SSL: "false"
      LOG_LEVEL: "warn"
    depends_on:
      unleash_db:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:4242/health || exit 1
      interval: 1s
      timeout: 1m
      retries: 5
      start_period: 15s
    networks:
      - servers

  unleash_db:
    expose:
      - "5432"
    image: postgres:14.19-alpine3.21
    environment:
      POSTGRES_DB: "db"
      POSTGRES_HOST_AUTH_METHOD: "trust"
    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "--username=postgres",
          "--host=127.0.0.1",
          "--port=5432"
        ]
      interval: 2s
      timeout: 1m
      retries: 5
      start_period: 10s
    networks:
      - servers

networks:
  servers:
    driver: bridge

volumes:
  minio: {}
